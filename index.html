<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>曲線アニメーション</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- KaTeX for math formulas -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
</head>
<body class="bg-slate-900 font-sans text-slate-800 m-0 overflow-hidden">
    <div class="flex flex-col md:flex-row h-screen">
        
        <!-- メインキャンバスエリア（画面いっぱいに広げる） -->
        <div class="flex-1 relative overflow-hidden bg-slate-900 shadow-[inset_0_0_100px_rgba(0,0,0,0.8)]" id="canvas-container">
            <canvas id="curveCanvas" class="absolute top-0 left-0 w-full h-full block"></canvas>
        </div>

        <!-- コントロールパネル（右側に固定） -->
        <div class="w-full md:w-[400px] shrink-0 bg-white shadow-2xl flex flex-col border-l border-slate-200 z-10 md:h-screen overflow-y-auto">
            
            <!-- ヘッダー -->
            <div class="p-6 border-b border-slate-100 bg-white sticky top-0 z-20">
                <div class="flex items-center gap-2 mb-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-600"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
                    <h1 class="text-xl font-bold">曲線アニメーション</h1>
                </div>
                <p class="text-sm text-slate-500">媒介変数表示と極方程式</p>
            </div>
            
            <div class="p-6 space-y-8 flex-1">
                
                <!-- 曲線選択 -->
                <div class="space-y-3">
                    <label class="block text-sm font-semibold text-slate-700">曲線の種類</label>
                    <select id="curveSelect" class="w-full bg-slate-50 border border-slate-300 text-slate-900 rounded-lg focus:ring-blue-500 focus:border-blue-500 block p-2.5 transition-colors cursor-pointer outline-none">
                        <!-- Options will be generated by JS -->
                    </select>
                </div>
                
                <!-- 数式表示 -->
                <div class="space-y-3">
                    <label class="block text-sm font-semibold text-slate-700">方程式</label>
                    <div class="bg-blue-50/50 rounded-xl p-4 min-h-[100px] flex items-center justify-center border border-blue-100/50 shadow-inner overflow-x-auto text-center" id="formulaContainer">
                        数式を読み込み中...
                    </div>
                </div>

                <!-- パラメータスライダー -->
                <div class="space-y-5">
                    <label class="block text-sm font-semibold text-slate-700 border-b border-slate-100 pb-2">
                        パラメータ
                    </label>
                    <div id="paramsContainer" class="space-y-4">
                        <!-- Sliders will be generated by JS -->
                    </div>
                </div>

                <!-- コントロール -->
                <div class="space-y-5 pt-2">
                    <label class="block text-sm font-semibold text-slate-700 border-b border-slate-100 pb-2">
                        コントロール
                    </label>
                    
                    <div class="flex gap-2">
                        <button id="playBtn" class="flex-1 flex items-center justify-center gap-2 py-2.5 px-4 rounded-lg text-white font-medium transition-all shadow-sm bg-blue-600 hover:bg-blue-700 active:bg-blue-800">
                            <svg id="playIcon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                            <svg id="pauseIcon" class="hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
                            <span id="playText">再生</span>
                        </button>
                        
                        <button id="resetBtn" class="flex items-center justify-center gap-2 py-2.5 px-4 rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium transition-all shadow-sm" title="最初から描画">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><path d="M10 11v6"></path><path d="M14 11v6"></path></svg>
                            <span class="sr-only">リセット</span>
                        </button>
                    </div>

                    <div class="space-y-1">
                        <div class="flex justify-between text-sm text-slate-600">
                            <span>描画速度</span>
                        </div>
                        <input type="range" id="speedSlider" min="0.01" max="0.2" step="0.01" value="0.05" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-slate-600">
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script>
        // 各曲線の定義
        const curveDefinitions = {
            cycloid: {
                id: 'cycloid', name: 'サイクロイド',
                equation: '\\begin{cases} x = a(\\theta - \\sin\\theta) \\\\ y = a(1 - \\cos\\theta) \\end{cases}',
                params: [{ id: 'a', label: 'a (円の半径)', min: 10, max: 200, step: 1, default: 60 }],
                drawOffset: { x: -400, y: 150 }, maxTheta: Math.PI * 6, // 3周期で停止
                calc: (t, p) => ({ x: p.a * (t - Math.sin(t)), y: p.a * (1 - Math.cos(t)) }),
                drawExtras: (ctx, t, p, currentPos) => {
                    const cx = p.a * t; const cy = p.a;
                    ctx.beginPath(); ctx.arc(cx, cy, p.a, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)'; ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(currentPos.x, currentPos.y); ctx.stroke();
                }
            },
            trochoid: {
                id: 'trochoid', name: 'トロコイド',
                equation: '\\begin{cases} x = a\\theta - b\\sin\\theta \\\\ y = a - b\\cos\\theta \\end{cases}',
                params: [
                    { id: 'a', label: 'a (円の半径)', min: 10, max: 200, step: 1, default: 60 },
                    { id: 'b', label: 'b (動点の距離)', min: 10, max: 300, step: 1, default: 90 }
                ],
                drawOffset: { x: -400, y: 150 }, maxTheta: Math.PI * 6,
                calc: (t, p) => ({ x: p.a * t - p.b * Math.sin(t), y: p.a - p.b * Math.cos(t) }),
                drawExtras: (ctx, t, p, currentPos) => {
                    const cx = p.a * t; const cy = p.a;
                    ctx.beginPath(); ctx.arc(cx, cy, p.a, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)'; ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(currentPos.x, currentPos.y); ctx.stroke();
                }
            },
            cardioid: {
                id: 'cardioid', name: 'カージオイド',
                equation: 'r = a(1 + \\cos\\theta) \\\\ \\begin{cases} x = a(2\\cos\\theta - \\cos 2\\theta) \\\\ y = a(2\\sin\\theta - \\sin 2\\theta) \\end{cases}',
                params: [{ id: 'a', label: 'a (サイズ係数)', min: 10, max: 200, step: 1, default: 80 }],
                drawOffset: { x: -50, y: 0 }, maxTheta: Math.PI * 2, // 1周で停止
                calc: (t, p) => ({ x: p.a * (2 * Math.cos(t) - Math.cos(2 * t)), y: p.a * (2 * Math.sin(t) - Math.sin(2 * t)) })
            },
            astroid: {
                id: 'astroid', name: 'アステロイド',
                equation: '\\begin{cases} x = a\\cos^3\\theta \\\\ y = a\\sin^3\\theta \\end{cases}',
                params: [{ id: 'a', label: 'a (サイズ係数)', min: 50, max: 400, step: 1, default: 200 }],
                drawOffset: { x: 0, y: 0 }, maxTheta: Math.PI * 2, // 1周で停止
                calc: (t, p) => ({ x: p.a * Math.pow(Math.cos(t), 3), y: p.a * Math.pow(Math.sin(t), 3) })
            },
            lissajous: {
                id: 'lissajous', name: 'リサージュ曲線',
                equation: '\\begin{cases} x = A\\sin(a\\theta + \\delta) \\\\ y = B\\sin(b\\theta) \\end{cases}',
                params: [
                    { id: 'A', label: 'A (X軸振幅)', min: 50, max: 500, step: 1, default: 280 },
                    { id: 'B', label: 'B (Y軸振幅)', min: 50, max: 500, step: 1, default: 200 },
                    { id: 'a', label: 'a (X周波数)', min: 1, max: 10, step: 0.1, default: 3 },
                    { id: 'b', label: 'b (Y周波数)', min: 1, max: 10, step: 0.1, default: 4 },
                    { id: 'delta', label: 'δ (位相差 × π)', min: 0, max: 2, step: 0.05, default: 0.5 }
                ],
                drawOffset: { x: 0, y: 0 }, maxTheta: Math.PI * 40, // 複雑な周期に対応するため長く
                calc: (t, p) => ({ x: p.A * Math.sin(p.a * t + p.delta * Math.PI), y: p.B * Math.sin(p.b * t) })
            },
            archimedean: {
                id: 'archimedean', name: 'アルキメデスの渦巻線',
                equation: 'r = a + b\\theta \\\\ \\begin{cases} x = r\\cos\\theta \\\\ y = r\\sin\\theta \\end{cases}',
                params: [
                    { id: 'a', label: 'a (初期半径)', min: 0, max: 100, step: 1, default: 0 },
                    { id: 'b', label: 'b (間隔係数)', min: 1, max: 50, step: 0.5, default: 10 }
                ],
                drawOffset: { x: 0, y: 0 }, maxTheta: Math.PI * 10, // 適度な巻き数で停止
                calc: (t, p) => { const r = p.a + p.b * t; return { x: r * Math.cos(t), y: r * Math.sin(t) }; }
            },
            rose: {
                id: 'rose', name: '正葉曲線',
                equation: 'r = a\\sin(k\\theta) \\\\ \\begin{cases} x = r\\cos\\theta \\\\ y = r\\sin\\theta \\end{cases}',
                params: [
                    { id: 'a', label: 'a (葉の長さ)', min: 50, max: 500, step: 1, default: 250 },
                    { id: 'k', label: 'k (葉のパラメータ)', min: 0.1, max: 10, step: 0.1, default: 4 }
                ],
                drawOffset: { x: 0, y: 0 }, maxTheta: Math.PI * 40, // 複雑な葉に対応するため長く
                calc: (t, p) => { const r = p.a * Math.sin(p.k * t); return { x: r * Math.cos(t), y: r * Math.sin(t) }; }
            }
        };

        // アプリケーション状態
        let selectedCurve = 'cycloid';
        let params = {};
        let isPlaying = false;
        let speed = 0.05;
        let theta = 0;
        let requestRef = null;

        // DOM要素
        const canvas = document.getElementById('curveCanvas');
        const ctx = canvas.getContext('2d');
        const curveSelect = document.getElementById('curveSelect');
        const formulaContainer = document.getElementById('formulaContainer');
        const paramsContainer = document.getElementById('paramsContainer');
        const playBtn = document.getElementById('playBtn');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');
        const playText = document.getElementById('playText');
        const resetBtn = document.getElementById('resetBtn');
        const speedSlider = document.getElementById('speedSlider');
        const canvasContainer = document.getElementById('canvas-container');

        // キャンバスサイズの調整（親要素いっぱいに広げる）
        function resizeCanvas() {
            // ディスプレイの解像度に合わせてシャープに描画するための処理
            const dpr = window.devicePixelRatio || 1;
            const rect = canvasContainer.getBoundingClientRect();
            
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            
            // CSSの表示サイズはコンテナに合わせる
            canvas.style.width = `${rect.width}px`;
            canvas.style.height = `${rect.height}px`;
            
            ctx.scale(dpr, dpr);
            draw();
        }
        window.addEventListener('resize', resizeCanvas);

        // UIの初期化
        function init() {
            Object.values(curveDefinitions).forEach(c => {
                const option = document.createElement('option');
                option.value = c.id;
                option.textContent = c.name;
                curveSelect.appendChild(option);
            });

            const checkKatex = setInterval(() => {
                if (window.katex) {
                    clearInterval(checkKatex);
                    changeCurve('cycloid');
                    // 初期再生
                    togglePlay(true);
                }
            }, 100);

            curveSelect.addEventListener('change', (e) => changeCurve(e.target.value));
            playBtn.addEventListener('click', () => togglePlay(!isPlaying));
            resetBtn.addEventListener('click', resetAnimation);
            speedSlider.addEventListener('input', (e) => { speed = parseFloat(e.target.value); });
        }

        // 曲線変更時の処理
        function changeCurve(curveId) {
            selectedCurve = curveId;
            const curve = curveDefinitions[curveId];
            
            params = {};
            curve.params.forEach(p => { params[p.id] = p.default; });
            
            if (window.katex) {
                window.katex.render(curve.equation, formulaContainer, { displayMode: true, throwOnError: false });
            }

            paramsContainer.innerHTML = '';
            curve.params.forEach(p => {
                const wrapper = document.createElement('div');
                wrapper.className = 'space-y-1';
                wrapper.innerHTML = `
                    <div class="flex justify-between text-sm">
                        <span class="text-slate-600">${p.label}</span>
                        <span id="val-${p.id}" class="font-mono font-medium text-blue-600 bg-blue-50 px-2 py-0.5 rounded">${params[p.id]}</span>
                    </div>
                    <input type="range" id="slider-${p.id}" min="${p.min}" max="${p.max}" step="${p.step}" value="${params[p.id]}" class="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600">
                `;
                paramsContainer.appendChild(wrapper);

                const slider = document.getElementById(`slider-${p.id}`);
                const valDisplay = document.getElementById(`val-${p.id}`);
                slider.addEventListener('input', (e) => {
                    params[p.id] = parseFloat(e.target.value);
                    valDisplay.textContent = params[p.id];
                    if (!isPlaying) draw();
                });
            });

            resizeCanvas(); // 曲線が変わるごとにサイズを再確認
            resetAnimation();
        }

        function togglePlay(forceState) {
            isPlaying = forceState !== undefined ? forceState : !isPlaying;
            
            if (isPlaying && theta >= curveDefinitions[selectedCurve].maxTheta) {
                theta = 0;
            }

            if (isPlaying) {
                playBtn.classList.replace('bg-blue-600', 'bg-rose-500');
                playBtn.classList.replace('hover:bg-blue-700', 'hover:bg-rose-600');
                playIcon.classList.add('hidden');
                pauseIcon.classList.remove('hidden');
                playText.textContent = '一時停止';
                update();
            } else {
                playBtn.classList.replace('bg-rose-500', 'bg-blue-600');
                playBtn.classList.replace('hover:bg-rose-600', 'hover:bg-blue-700');
                playIcon.classList.remove('hidden');
                pauseIcon.classList.add('hidden');
                playText.textContent = '再生';
                if (requestRef) cancelAnimationFrame(requestRef);
                draw(); 
            }
        }

        function resetAnimation() {
            theta = 0;
            if (!isPlaying) draw();
            else {
                if (requestRef) cancelAnimationFrame(requestRef);
                update();
            }
        }

        // 描画ロジック
        function draw() {
            if (!canvas.width || Object.keys(params).length === 0) return;
            
            const curve = curveDefinitions[selectedCurve];
            const rect = canvasContainer.getBoundingClientRect();
            const width = rect.width;
            const height = rect.height;

            ctx.clearRect(0, 0, width, height);
            ctx.save();
            
            // 原点移動 (キャンバス中心 + オフセット)
            ctx.translate(width / 2 + curve.drawOffset.x, height / 2 + curve.drawOffset.y);
            ctx.scale(1, -1); // Y軸上向き

            // 軸描画（ダーク背景用に薄い白）
            ctx.beginPath();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)'; 
            ctx.lineWidth = 1;
            // 軸を画面外まで十分に伸ばす
            const axisLength = Math.max(width, height) * 2;
            ctx.moveTo(-axisLength, 0); ctx.lineTo(axisLength, 0);
            ctx.moveTo(0, -axisLength); ctx.lineTo(0, axisLength);
            ctx.stroke();

            // 軌跡描画用のグラデーション作成
            const gradient = ctx.createLinearGradient(-width/2, -height/2, width/2, height/2);
            gradient.addColorStop(0, '#00f2fe');   // シアン
            gradient.addColorStop(0.5, '#4facfe'); // ブルー
            gradient.addColorStop(1, '#f093fb');   // ピンク・パープル

            // 軌跡描画
            ctx.beginPath();
            ctx.strokeStyle = gradient; 
            ctx.lineWidth = 2.5;
            
            const stepSize = 0.05;
            for (let t = 0; t <= theta; t += stepSize) {
                const pos = curve.calc(t, params);
                if (t === 0) ctx.moveTo(pos.x, pos.y);
                else ctx.lineTo(pos.x, pos.y);
            }
            
            const currentPos = curve.calc(theta, params);
            ctx.lineTo(currentPos.x, currentPos.y);
            
            // グロー効果
            ctx.shadowBlur = 6;
            ctx.shadowColor = '#4facfe';
            ctx.stroke();
            ctx.shadowBlur = 0;

            // 補助線
            if (curve.drawExtras) {
                curve.drawExtras(ctx, theta, params, currentPos);
            }

            // 動点描画
            ctx.beginPath();
            ctx.arc(currentPos.x, currentPos.y, 4, 0, Math.PI * 2);
            ctx.fillStyle = '#ffffff'; 
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#00f2fe';
            ctx.fill();
            ctx.shadowBlur = 0;

            ctx.restore();
        }

        // アニメーションループ
        function update() {
            if (!isPlaying) return;

            theta += speed;
            const maxT = curveDefinitions[selectedCurve].maxTheta;
            
            if (theta >= maxT) {
                theta = maxT;
                draw();
                togglePlay(false);
                return;
            }

            draw();
            requestRef = requestAnimationFrame(update);
        }

        // 起動
        init();

    </script>
</body>
</html>
